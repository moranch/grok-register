# 只启动 console 服务，用于本地快速验证前端/后端集成是否正常
# 使用方法:
#   docker compose -f docker-compose.console-only.yml up -d --build
services:
  console:
    build:
      context: .
      dockerfile: apps/worker-runtime/Dockerfile
    container_name: grok-console-local
    working_dir: /workspace
    command: python /workspace/apps/console/app.py
    environment:
      GROK_REGISTER_SOURCE_DIR: /workspace
      GROK_REGISTER_PYTHON: /usr/local/bin/python
      GROK_REGISTER_CONSOLE_HOST: 0.0.0.0
      GROK_REGISTER_CONSOLE_PORT: "18600"
      # 开启管理员密码登录（默认 admin123，可自行修改）
      GROK_REGISTER_CONSOLE_PASSWORD: "admin123"
      GROK_REGISTER_CONSOLE_MAX_CONCURRENT_TASKS: 1
      GROK_REGISTER_DEFAULT_RUN_COUNT: 50
      # 本地不走 warp，留空表示直连
      GROK_REGISTER_DEFAULT_PROXY: ""
      GROK_REGISTER_DEFAULT_BROWSER_PROXY: ""
      # 本地没有 grok2api，留空
      GROK_REGISTER_DEFAULT_API_ENDPOINT: ""
      GROK_REGISTER_DEFAULT_API_TOKEN: ""
      GROK_REGISTER_DEFAULT_API_APPEND: "true"
    ports:
      - "18600:18600"
    volumes:
      - .:/workspace
    restart: unless-stopped
